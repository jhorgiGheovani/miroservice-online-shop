services:
  key-generator:
    image: alpine/openssl
    container_name: key-generator
    volumes:
      - auth_keys_data:/keys/auth
      - public_keys_data:/keys/public
    entrypoint: sh
    command: >
      -c "
          if [ ! -f /keys/auth/private_key.pem ]; then
            openssl genrsa -out /keys/auth/private_key.pem 2048 &&
            openssl rsa -in /keys/auth/private_key.pem -pubout -out /keys/auth/public_key.pem &&
            cp /keys/auth/public_key.pem /keys/public/public_key.pem &&
            echo 'Keys generated successfully.'
          else
            echo 'Keys already exist, skipping generation.'
          fi
        "

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://:29092,PLAINTEXT_EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  user-service:
    build:
      context: ./user_service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KEYS_PUBLIC_KEY_PATH: /app/keys/public_key.pem
    volumes:
      - public_keys_data:/app/keys
    depends_on:
      key-generator:
        condition: service_completed_successfully
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth_service
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KEYS_PRIVATE_KEY_PATH: /app/keys/private_key.pem
      APP_KEYS_PUBLIC_KEY_PATH: /app/keys/public_key.pem
      APP_USER_SERVICE_BASE_URL: http://user-service:8081
      APP_KEYS_SHARED_PUBLIC_KEY_PATH: /app/shared-keys/public_key.pem
    volumes:
      - auth_keys_data:/app/keys
      - public_keys_data:/app/shared-keys
    depends_on:
      key-generator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - app-network

  order-service:
    build:
      context: ./order_service
    container_name: order-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KEYS_PUBLIC_KEY_PATH: /app/keys/public_key.pem
    volumes:
      - public_keys_data:/app/keys
    depends_on:
      key-generator:
        condition: service_completed_successfully
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  payment-service:
    build:
      context: ./payment_service
    container_name: payment-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KEYS_PUBLIC_KEY_PATH: /app/keys/public_key.pem
    volumes:
      - public_keys_data:/app/keys
    depends_on:
      key-generator:
        condition: service_completed_successfully
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - user-service
      - order-service
      - payment-service
    networks:
      - app-network

volumes:
  auth_keys_data:
  public_keys_data:
  kafka_data:
  user_db_data:
  order_db_data:
  payment_db_data:

networks:
  app-network:
    driver: bridge
