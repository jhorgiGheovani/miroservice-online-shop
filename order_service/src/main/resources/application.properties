server.port=8085

spring.application.name=order_service

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topic.key-rotation=public-key-rotation

app.keys.public-key-path=src/main/resources/public_key.pem

spring.datasource.url=jdbc:postgresql://localhost:5435/order_service
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

